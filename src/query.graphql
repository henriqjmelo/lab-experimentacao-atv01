query ($queryString: String!, $first: Int!, $after: String) {
  search(query: $queryString, type: REPOSITORY, first: $first, after: $after) {
    pageInfo {
      endCursor
      hasNextPage
    }
    nodes {
      ... on Repository {
        name
        owner {
          login
        }
        stargazerCount
        forkCount
        createdAt
        updatedAt
        primaryLanguage {
          name
        }
        pullRequests(states: MERGED) {
          totalCount
        }
        releases {
          totalCount
        }
        issues(states: CLOSED) {
          totalCount
        }
        totalIssues: issues {
          totalCount
        }
        diskUsage
        licenseInfo {
          spdxId
          name
        }
      }
    }
  }
}
