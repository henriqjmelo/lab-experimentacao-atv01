query SearchRepositories($queryString: String!, $first: Int!, $after: String) {
  search(query: $queryString, type: REPOSITORY, first: $first, after: $after) {
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      ... on Repository {
        # Identificação
        name
        owner {
          login
        }
        
        # Popularidade
        stargazerCount
        forkCount
        
        # Datas
        createdAt
        updatedAt
        
        # Linguagem
        primaryLanguage {
          name
        }
        
        # Contribuições (RQ02)
        pullRequests(first: 0) {
          totalCount
        }
        
        # Releases (RQ03)
        releases(first: 0) {
          totalCount
        }
        
        # Issues (RQ06)
        issues(first: 0, states: CLOSED) {
          totalCount
        }
        totalIssues: issues(first: 0) {
          totalCount
        }
        
        # Metadados
        diskUsage
        defaultBranchRef {
          name
          target {
            ... on Commit {
              history(first: 0) {
                totalCount
              }
            }
          }
        }
        
        # Licença
        licenseInfo {
          spdxId
          name
        }
        
        # Tópicos
        repositoryTopics(first: 10) {
          nodes {
            topic {
              name
            }
          }
        }
      }
    }
  }
}
